services:
  - type: web
    name: invoice-api
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn Invoice.wsgi:application"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: invoice-api-db
          property: connectionString

databases:
  - name: invoice-api-db
    plan: free